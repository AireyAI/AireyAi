<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AireyAi — Business Brief v2</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23070710'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-weight='900' font-size='18' fill='%2300e5a0'>Ai</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --mint:       #00e5a0;
      --mint-dim:   rgba(0, 229, 160, 0.12);
      --mint-glow:  rgba(0, 229, 160, 0.25);
      --bg:         #070710;
      --surface:    #0d0d1f;
      --surface-2:  #13132a;
      --border:     rgba(255,255,255,0.07);
      --border-focus: rgba(0, 229, 160, 0.5);
      --text:       #eeeef8;
      --text-muted: #6b6b8a;
      --text-sub:   #9898b8;
      --danger:     #ff4d6d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background orbs ─────────────────────────── */
    .orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15; }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #3d2fff 0%, transparent 70%);
      top: -200px; left: -100px;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #00e5a0 0%, transparent 70%);
      bottom: -150px; right: -100px;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      top: 40%; left: 60%;
      animation: drift3 15s ease-in-out infinite alternate;
    }
    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(80px,60px) scale(1.1); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-60px,-80px) scale(1.15); } }
    @keyframes drift3 { from { transform: translate(0,0) scale(1); } to { transform: translate(-40px,50px) scale(0.9); } }

    /* ── Nav ───────────────────────────────────────────────── */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,16,0.8);
      backdrop-filter: blur(16px);
    }
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 26px; font-weight: 800;
      letter-spacing: -0.03em; color: var(--text);
    }
    .logo span { color: var(--mint); }
    .nav-badge {
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px;
    }

    /* ── Main ──────────────────────────────────────────────── */
    main {
      position: relative; z-index: 1;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 48px 16px 100px;
    }

    /* ── Card ──────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 64px rgba(0,0,0,0.5);
      max-width: 600px; width: 100%;
      padding: 44px;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--mint-glow), transparent);
    }

    /* ── Progress ──────────────────────────────────────────── */
    .progress-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
    }
    .progress-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .progress-pct {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--mint);
    }
    .progress-track {
      height: 2px; background: var(--surface-2); border-radius: 99px;
      margin-bottom: 40px; overflow: hidden;
    }
    .progress-fill {
      height: 2px; background: var(--mint); border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px var(--mint-glow);
    }

    /* ── Typography ────────────────────────────────────────── */
    .section-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--mint-dim); color: var(--mint);
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 4px 12px;
      border-radius: 99px; border: 1px solid rgba(0,229,160,0.2);
      margin-bottom: 14px;
    }
    .section-pill::before { content: '●'; font-size: 7px; }
    .step-title {
      font-family: 'Syne', sans-serif;
      font-size: 28px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.15;
      color: var(--text); margin-bottom: 8px;
    }
    .step-sub {
      font-size: 14px; color: var(--text-sub); line-height: 1.6;
      margin-bottom: 32px; font-weight: 300;
    }

    /* ── Labels & inputs ───────────────────────────────────── */
    label {
      display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
      color: var(--text-sub); margin-bottom: 7px; text-transform: uppercase;
    }
    .optional { font-weight: 400; color: var(--text-muted); font-size: 10px; margin-left: 4px; text-transform: none; letter-spacing: 0; }
    .field {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      font-size: 14px; font-family: 'DM Sans', sans-serif;
      color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 20px;
    }
    .field::placeholder { color: var(--text-muted); }
    .field:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--mint-dim); }
    textarea.field { min-height: 96px; resize: vertical; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 500px) {
      .two-col { grid-template-columns: 1fr; }
      .card { padding: 28px 20px; }
      .step-title { font-size: 22px; }
    }

    /* ── Chips ─────────────────────────────────────────────── */
    .chips-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 16px; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 99px; font-size: 13px; font-weight: 400; color: var(--text-sub);
      cursor: pointer; user-select: none; transition: all 0.15s;
    }
    .chip:hover { border-color: rgba(0,229,160,0.3); color: var(--text); }
    .chip.selected {
      background: var(--mint-dim); border-color: rgba(0,229,160,0.4); color: var(--mint);
      box-shadow: 0 0 12px rgba(0,229,160,0.1);
    }
    .chip.selected::before { content: '✓'; font-size: 11px; font-weight: 700; }

    /* ── Divider ───────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 28px 0; }

    /* ── Buttons ───────────────────────────────────────────── */
    .btn-primary {
      background: var(--mint); color: #070710; border: none; border-radius: 10px;
      padding: 13px 32px; font-size: 14px; font-weight: 600;
      font-family: 'DM Sans', sans-serif; cursor: pointer; letter-spacing: 0.01em;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 0 20px rgba(0,229,160,0.25);
    }
    .btn-primary:hover { opacity: 0.9; box-shadow: 0 0 30px rgba(0,229,160,0.4); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    .btn-ghost {
      background: none; border: none; color: var(--text-muted); font-size: 14px;
      font-family: 'DM Sans', sans-serif; cursor: pointer; padding: 0; transition: color 0.15s;
    }
    .btn-ghost:hover { color: var(--text); }

    .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }
    .nav-row-right { display: flex; justify-content: flex-end; margin-top: 12px; }

    /* ── Summary ───────────────────────────────────────────── */
    .summary-wrap {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px 20px; margin-bottom: 28px;
    }
    .summary-row {
      display: flex; gap: 16px; padding: 12px 0;
      border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.5;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--text-muted);
      min-width: 120px; flex-shrink: 0; padding-top: 1px;
    }
    .summary-value { color: var(--text); word-break: break-word; }

    /* ── Thank you ─────────────────────────────────────────── */
    .thankyou { text-align: center; padding: 32px 0 16px; }
    .thankyou-icon {
      width: 64px; height: 64px; background: var(--mint-dim);
      border: 1px solid rgba(0,229,160,0.3); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      color: var(--mint); font-weight: 700; font-family: 'Syne', sans-serif; font-size: 24px;
    }
    .thankyou-title {
      font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800;
      letter-spacing: -0.03em; margin-bottom: 12px;
    }
    .thankyou-sub {
      font-size: 15px; color: var(--text-sub); line-height: 1.7;
      font-weight: 300; max-width: 380px; margin: 0 auto;
    }

    /* ── Step transition ───────────────────────────────────── */
    @keyframes stepIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #step-container { animation: stepIn 0.3s ease; }

    footer {
      position: relative; z-index: 1; text-align: center; padding: 24px;
      font-size: 12px; color: var(--text-muted);
    }
    footer strong { color: var(--text-sub); }

    /* ── Intro screen ──────────────────────────────────────── */
    .intro {
      text-align: center; padding: 16px 0 8px;
    }
    .intro-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--mint-dim); color: var(--mint);
      font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; padding: 4px 14px;
      border-radius: 99px; border: 1px solid rgba(0,229,160,0.2);
      margin-bottom: 24px;
    }
    .intro-eyebrow::before { content: '●'; font-size: 7px; }
    .intro-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px; font-weight: 800; letter-spacing: -0.04em;
      line-height: 1.1; margin-bottom: 16px; color: var(--text);
    }
    .intro-title span { color: var(--mint); }
    .intro-sub {
      font-size: 15px; color: var(--text-sub); line-height: 1.7;
      font-weight: 300; max-width: 420px; margin: 0 auto 32px;
    }
    .intro-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-bottom: 36px;
    }
    .intro-pill {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 99px; padding: 5px 14px;
      font-size: 12px; color: var(--text-muted);
    }
    .intro-pill span { color: var(--mint); margin-right: 4px; }

    /* ── Photo upload ─────────────────────────────────────── */
    .photo-upload-zone {
      border: 1.5px dashed rgba(0,229,160,0.3); border-radius: 12px;
      padding: 24px 16px; text-align: center; cursor: pointer;
      background: var(--surface); transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px; position: relative;
    }
    .photo-upload-zone:hover { border-color: var(--mint); background: var(--mint-dim); }
    .photo-upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .photo-upload-icon { font-size: 28px; margin-bottom: 8px; }
    .photo-upload-label { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .photo-upload-sub { font-size: 12px; color: var(--text-muted); }
    .photo-limit { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
    @media (max-width: 480px) { .photo-grid { grid-template-columns: repeat(2, 1fr); } }
    .photo-thumb {
      position: relative; border-radius: 8px; overflow: hidden;
      aspect-ratio: 1; background: var(--surface-2);
      border: 1px solid var(--border);
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-thumb-remove {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,0.7); border: none; color: #fff;
      font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .photo-count { font-size: 12px; color: var(--mint); margin-bottom: 12px; }

    /* ── Saved indicator ───────────────────────────────────── */
    .saved-indicator {
      position: fixed; bottom: 24px; right: 24px; z-index: 100;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 99px; padding: 6px 14px;
      font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .saved-indicator.show { opacity: 1; }
    .saved-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mint); }

    /* ── Field error state ─────────────────────────────────── */
    .field.error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(255,77,109,0.1); }
  </style>
</head>
<body>

  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <nav>
    <div class="logo">Airey<span>Ai</span></div>
    <span class="nav-badge">Business Brief</span>
  </nav>

  <main>
    <div class="card">
      <div class="progress-header" id="progress-header" style="display:none;">
        <span class="progress-label" id="step-label">Step 1 of 4</span>
        <span class="progress-pct" id="step-pct">25%</span>
      </div>
      <div class="progress-track" id="progress-track" style="display:none;">
        <div class="progress-fill" id="progress-fill" style="width:25%;"></div>
      </div>
      <div id="step-container"></div>
    </div>
  </main>

  <div class="saved-indicator" id="saved-indicator">
    <div class="saved-dot"></div> Progress saved
  </div>

  <footer>Powered by <strong>AireyAi</strong></footer>

  <script>
    const STORAGE_KEY = 'aireyai_brief_v1';
    const STEP_KEY    = STORAGE_KEY + '_step';
    let currentStep   = 0;
    const TOTAL_STEPS = 4;

    const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

    let savedTimer;
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      const ind = document.getElementById('saved-indicator');
      ind.classList.add('show');
      clearTimeout(savedTimer);
      savedTimer = setTimeout(() => ind.classList.remove('show'), 2000);
    }

    function goToStep(n) {
      currentStep = n;
      localStorage.setItem(STEP_KEY, n);
      // Show progress bar once past intro
      document.getElementById('progress-header').style.display = '';
      document.getElementById('progress-track').style.display = '';
      updateProgress();
      const c = document.getElementById('step-container');
      c.style.animation = 'none'; c.offsetHeight; c.style.animation = '';
      steps[n](c);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function updateProgress() {
      const pct = Math.round(((currentStep + 1) / TOTAL_STEPS) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('step-label').textContent = `Step ${currentStep + 1} of ${TOTAL_STEPS}`;
      document.getElementById('step-pct').textContent = pct + '%';
    }

    function showIntro() {
      document.getElementById('progress-header').style.display = 'none';
      document.getElementById('progress-track').style.display = 'none';
      const c = document.getElementById('step-container');
      c.innerHTML = '';
      const wrap = document.createElement('div'); wrap.className = 'intro';

      const eyebrow = document.createElement('div'); eyebrow.className = 'intro-eyebrow'; eyebrow.textContent = 'Business Brief'; wrap.appendChild(eyebrow);

      const title = document.createElement('div'); title.className = 'intro-title';
      title.innerHTML = 'Tell us about your<br><span>business</span>'; wrap.appendChild(title);

      const sub = document.createElement('div'); sub.className = 'intro-sub';
      sub.textContent = "Answer a few quick questions and we'll have everything we need to build you something great. Takes about 2 minutes."; wrap.appendChild(sub);

      const pills = document.createElement('div'); pills.className = 'intro-pills';
      [['⚡','2 minutes'], ['💾','Auto-saved'], ['🔒','Private & secure']].forEach(([icon, text]) => {
        const p = document.createElement('div'); p.className = 'intro-pill';
        p.innerHTML = `<span>${icon}</span>${text}`; pills.appendChild(p);
      });
      wrap.appendChild(pills);

      const btn = document.createElement('button'); btn.className = 'btn-primary';
      btn.style.cssText = 'padding:14px 40px;font-size:15px;';
      btn.textContent = "Let's go →";
      btn.onclick = () => goToStep(0);
      wrap.appendChild(btn);

      c.appendChild(wrap);
    }

    function makeLabel(text, optional, container) {
      const lbl = document.createElement('label');
      lbl.innerHTML = text + (optional ? '<span class="optional">(optional)</span>' : '');
      container.appendChild(lbl);
    }

    function renderField(key, placeholder, container, multiline, optional) {
      const input = document.createElement(multiline ? 'textarea' : 'input');
      input.className = 'field';
      input.placeholder = placeholder;
      input.value = state[key] || '';
      if (!multiline) input.type = 'text';
      input.oninput = () => { state[key] = input.value; saveState(); };
      container.appendChild(input);
      return input;
    }

    function renderPhotoUpload(container) {
      if (!state.jobPhotos) state.jobPhotos = [];

      const countEl = document.createElement('div');
      countEl.className = 'photo-count';

      const grid = document.createElement('div');
      grid.className = 'photo-grid';

      const zone = document.createElement('div');
      zone.className = 'photo-upload-zone';
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.multiple = true;
      const icon = document.createElement('div'); icon.className = 'photo-upload-icon'; icon.textContent = '📸';
      const lbl = document.createElement('div'); lbl.className = 'photo-upload-label'; lbl.textContent = 'Upload photos';
      const sub = document.createElement('div'); sub.className = 'photo-upload-sub'; sub.textContent = 'Finished work, logos, team photos — no limit';
      zone.appendChild(icon); zone.appendChild(lbl); zone.appendChild(sub); zone.appendChild(input);

      function rebuildGrid() {
        grid.innerHTML = '';
        countEl.textContent = state.jobPhotos.length ? `${state.jobPhotos.length} photo${state.jobPhotos.length !== 1 ? 's' : ''} added` : '';
        state.jobPhotos.forEach((src, i) => {
          const thumb = document.createElement('div');
          thumb.className = 'photo-thumb';
          const img = document.createElement('img');
          img.src = src;
          const rm = document.createElement('button');
          rm.className = 'photo-thumb-remove';
          rm.textContent = '✕';
          rm.onclick = (e) => { e.stopPropagation(); state.jobPhotos.splice(i, 1); saveState(); rebuildGrid(); };
          thumb.appendChild(img);
          thumb.appendChild(rm);
          grid.appendChild(thumb);
        });
      }
      rebuildGrid();

      input.onchange = () => {
        const files = Array.from(input.files);
        let loaded = 0;
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = e => {
            state.jobPhotos.push(e.target.result);
            loaded++;
            if (loaded === files.length) { saveState(); rebuildGrid(); }
          };
          reader.readAsDataURL(file);
        });
        input.value = '';
      };

      container.appendChild(grid);
      container.appendChild(countEl);
      container.appendChild(zone);
    }

    function renderChips(key, options, container) {
      const selected = state[key] || [];
      const wrap = document.createElement('div'); wrap.className = 'chips-wrap';
      options.forEach(opt => {
        const chip = document.createElement('span');
        chip.className = 'chip' + (selected.includes(opt) ? ' selected' : '');
        chip.textContent = opt;
        chip.onclick = () => {
          const arr = state[key] || [];
          const idx = arr.indexOf(opt);
          if (idx === -1) arr.push(opt); else arr.splice(idx, 1);
          state[key] = arr; saveState();
          chip.className = 'chip' + (arr.includes(opt) ? ' selected' : '');
        };
        wrap.appendChild(chip);
      });
      container.appendChild(wrap);
    }

    function makeTwoCol(container) {
      const row = document.createElement('div'); row.className = 'two-col';
      container.appendChild(row); return row;
    }

    /* No required-field validation — all fields are optional and skippable */

    function generateMarkdown() {
      const s = state;
      const slug = (s.businessName||'business').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
      const lines = [
        `# Business Brief — ${s.businessName||'Unnamed Business'}`, '',
        '## About You',
        `- **Name:** ${s.fullName||'—'}`, `- **Phone:** ${s.phone||'—'}`, `- **Email:** ${s.email||'—'}`, '',
        '## Your Business',
        `- **Business Name:** ${s.businessName||'—'}`,
        `- **Industry:** ${(s.industry||[]).join(', ')||'—'}`,
        `- **Location:** ${[s.city, s.country].filter(Boolean).join(', ')||'—'}`,
        `- **Website:** ${s.website||'—'}`, '',
        '## Your Brand',
        `- **Tagline:** ${s.tagline||'—'}`, `- **Services / Products:** ${s.services||'—'}`,
        `- **Brand Voice:** ${(s.brandVoice||[]).join(', ')||'—'}`,
        `- **Colour Palette:** ${(s.colourPalette||[]).join(', ')||'—'}${s.customColours?' · '+s.customColours:''}`,
        `- **Website Vibe:** ${(s.websiteVibe||[]).join(', ')||'—'}`, '',
        '## Your Customers',
        `- **Target Customers:** ${(s.targetCustomers||[]).join(', ')||'—'}`,
        `- **Visitor Goal:** ${(s.visitorGoal||[]).join(', ')||'—'}`,
        `- **Social Media:** ${(s.socialMedia||[]).join(', ')||'—'}`, '',
        '## Website Project',
        `- **Features Needed:** ${(s.features||[]).join(', ')||'—'}`,
        `- **Pages Needed:** ${(s.pages||[]).join(', ')||'—'}`,
        `- **Has Logo:** ${(s.hasLogo||[]).join(', ')||'—'}`,
        `- **Has Photos:** ${(s.hasPhotos||[]).join(', ')||'—'}`,
        `- **Timeline:** ${(s.timeline||[]).join(', ')||'—'}`,
        `- **Inspiration Sites:** ${s.inspiration||'—'}`,
        `- **Website Goals:** ${(s.goals||[]).join(', ')||'—'}`,
        `- **Additional Notes:** ${s.notes||'—'}`,
        '', '---', '_Generated by AireyAi_',
      ];
      return { md: lines.join('\n'), slug };
    }

    function showThankYou() {
      document.querySelector('.progress-header').style.display = 'none';
      document.querySelector('.progress-track').style.display = 'none';
      const c = document.getElementById('step-container');
      c.innerHTML = '';
      const wrap = document.createElement('div'); wrap.className = 'thankyou';
      const icon = document.createElement('div'); icon.className = 'thankyou-icon'; icon.textContent = '✓'; wrap.appendChild(icon);
      const title = document.createElement('div'); title.className = 'thankyou-title'; title.textContent = "You're all set!"; wrap.appendChild(title);
      const sub = document.createElement('div'); sub.className = 'thankyou-sub'; sub.textContent = "We've received your business brief. We'll review it and be in touch with you soon."; wrap.appendChild(sub);
      localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(STEP_KEY);
      c.appendChild(wrap);
    }

    const steps = [

      function(c) {
        c.innerHTML = '';
        const pill = document.createElement('span'); pill.className = 'section-pill'; pill.textContent = 'About You & Your Business'; c.appendChild(pill);
        const title = document.createElement('div'); title.className = 'step-title'; title.textContent = "Let's start with the basics"; c.appendChild(title);
        const sub = document.createElement('div'); sub.className = 'step-sub'; sub.textContent = 'A few details about you and your business.'; c.appendChild(sub);

        makeLabel('Full Name', false, c); renderField('fullName', 'Jane Smith', c);

        const cr = makeTwoCol(c);
        const pw = document.createElement('div'); makeLabel('Phone Number', false, pw); renderField('phone', '+1 555 000 0000', pw); cr.appendChild(pw);
        const ew = document.createElement('div'); makeLabel('Email Address', false, ew); renderField('email', 'hello@yourbiz.com', ew); cr.appendChild(ew);

        makeLabel('Business Name', false, c); renderField('businessName', 'Your Business Name', c);

        makeLabel('Industry', false, c);
        renderChips('industry', ['Retail','Hospitality','Health & Beauty','Trades & Construction','Professional Services','Technology','Food & Drink','Education','Creative & Media','Fitness & Wellness','Automotive','Property','Other'], c);

        const locRow = makeTwoCol(c);
        const cityW = document.createElement('div'); makeLabel('City', false, cityW); renderField('city', 'e.g. London', cityW); locRow.appendChild(cityW);
        const countryW = document.createElement('div'); makeLabel('Country', false, countryW); renderField('country', 'e.g. United Kingdom', countryW); locRow.appendChild(countryW);

        makeLabel('Website', true, c); renderField('website', 'yoursite.com', c, false, true);

        const nav = document.createElement('div'); nav.className = 'nav-row-right';
        const next = document.createElement('button'); next.className = 'btn-primary'; next.textContent = 'Next →';
        next.onclick = () => goToStep(1);
        nav.appendChild(next); c.appendChild(nav);
      },

      function(c) {
        c.innerHTML = '';
        const pill = document.createElement('span'); pill.className = 'section-pill'; pill.textContent = 'Your Brand'; c.appendChild(pill);
        const title = document.createElement('div'); title.className = 'step-title'; title.textContent = 'Tell us about your brand'; c.appendChild(title);
        const sub = document.createElement('div'); sub.className = 'step-sub'; sub.textContent = 'How your business looks, sounds, and feels.'; c.appendChild(sub);

        makeLabel('Describe your business in one sentence', true, c); renderField('tagline', 'e.g. "We make homes look brand new" or "Premium lashes in South London"', c, false, true);
        makeLabel('What do you offer?', true, c); renderField('services', 'List your main services or products', c, true);

        const div1 = document.createElement('div'); div1.className = 'divider'; c.appendChild(div1);

        makeLabel('Brand Voice', true, c);
        renderChips('brandVoice', ['Professional','Friendly','Luxury','Playful','Bold','Minimalist'], c);
        makeLabel('Colour Palette', true, c);
        renderChips('colourPalette', ['Black & Gold','Blues & Whites','Earthy Tones','Pastels','Bold & Bright','Dark & Moody'], c);
        makeLabel('Custom Colours', true, c); renderField('customColours', 'e.g. Navy blue and gold', c, false, true);
        makeLabel('Website Vibe', true, c);
        renderChips('websiteVibe', ['Clean & Minimal','Bold & Colourful','Luxury/Premium','Fun & Playful','Corporate','Modern'], c);

        const nav = document.createElement('div'); nav.className = 'nav-row';
        const back = document.createElement('button'); back.className = 'btn-ghost'; back.textContent = '← Back'; back.onclick = () => goToStep(0);
        const next = document.createElement('button'); next.className = 'btn-primary'; next.textContent = 'Next →';
        next.onclick = () => goToStep(2);
        nav.appendChild(back); nav.appendChild(next); c.appendChild(nav);
      },

      function(c) {
        c.innerHTML = '';
        const pill = document.createElement('span'); pill.className = 'section-pill'; pill.textContent = 'Your Customers'; c.appendChild(pill);
        const title = document.createElement('div'); title.className = 'step-title'; title.textContent = 'Who are your customers?'; c.appendChild(title);
        const sub = document.createElement('div'); sub.className = 'step-sub'; sub.textContent = 'Help us understand who you serve.'; c.appendChild(sub);

        makeLabel('Target Customers', true, c);
        renderChips('targetCustomers', ['Individuals','Families','Small Businesses','Corporates','Young Adults','Local Community','Homeowners','Other'], c);

        makeLabel('What do you want visitors to do?', false, c);
        renderChips('visitorGoal', ['Book a Call','Make an Enquiry','Buy a Product','Visit In Person','Get a Quote','Follow on Social','Book Online','Request a Callback'], c);

        makeLabel('Social Media Presence', true, c);
        renderChips('socialMedia', ['Instagram','Facebook','TikTok','LinkedIn','Twitter/X','WhatsApp','YouTube','Google Business'], c);

        const nav = document.createElement('div'); nav.className = 'nav-row';
        const back = document.createElement('button'); back.className = 'btn-ghost'; back.textContent = '← Back'; back.onclick = () => goToStep(1);
        const next = document.createElement('button'); next.className = 'btn-primary'; next.textContent = 'Next →';
        next.onclick = () => goToStep(3);
        nav.appendChild(back); nav.appendChild(next); c.appendChild(nav);
      },

      function(c) {
        c.innerHTML = '';
        const pill = document.createElement('span'); pill.className = 'section-pill'; pill.textContent = 'Almost Done'; c.appendChild(pill);
        const title = document.createElement('div'); title.className = 'step-title'; title.textContent = 'Looking good!'; c.appendChild(title);
        const sub = document.createElement('div'); sub.className = 'step-sub'; sub.textContent = 'Anything else we should know? Then hit submit.'; c.appendChild(sub);

        makeLabel('What features do you need?', false, c);
        renderChips('features', ['Contact Form','Online Booking','Online Shop','Photo Gallery','Blog','Testimonials','Pricing Page','FAQ','Map','Before & After','Reviews','WhatsApp Button','Menu / Price List'], c);

        makeLabel('How many pages do you need?', false, c);
        renderChips('pages', ['Just a landing page','Home + a few pages','Full multi-page site','Not sure'], c);

        makeLabel('Do you have a logo?', false, c);
        renderChips('hasLogo', ['Yes','Not yet'], c);

        makeLabel('Do you have photos or images?', false, c);
        renderChips('hasPhotos', ['Yes, professional photos','Yes, phone photos','No, use stock images'], c);

        makeLabel('Upload photos — finished work, logos, team members', true, c);
        renderPhotoUpload(c);

        makeLabel('What\'s your timeline?', false, c);
        renderChips('timeline', ['ASAP','Within a month','No rush'], c);

        const div2 = document.createElement('div'); div2.className = 'divider'; c.appendChild(div2);

        makeLabel('Any websites you love the look of?', true, c);
        renderField('inspiration', 'Paste URLs here — e.g. apple.com, notion.so', c, true, true);

        makeLabel('What do you want your website to achieve?', true, c);
        renderChips('goals', ['Generate Leads','Increase Bookings','Sell Products Online','Build Brand Awareness','Showcase Portfolio','Provide Information','Get More Calls','Grow Social Following','Build Trust','Rank on Google'], c);

        makeLabel('Anything else we should know?', true, c);
        renderField('notes', 'Awards, backstory, special requests…', c, true, true);

        const stitle = document.createElement('div');
        stitle.style.cssText = 'font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin:24px 0 12px;';
        stitle.textContent = 'Your Summary'; c.appendChild(stitle);

        const sw = document.createElement('div'); sw.className = 'summary-wrap';
        const rows = [
          ['Name', state.fullName], ['Phone', state.phone], ['Email', state.email],
          ['Business', state.businessName], ['Industry', (state.industry||[]).join(', ')],
          ['Location', [state.city, state.country].filter(Boolean).join(', ')],
          ['Website', state.website], ['One-liner', state.tagline], ['Services', state.services],
          ['Brand Voice', (state.brandVoice||[]).join(', ')],
          ['Colours', [(state.colourPalette||[]).join(', '), state.customColours].filter(Boolean).join(' · ')],
          ['Vibe', (state.websiteVibe||[]).join(', ')],
          ['Customers', (state.targetCustomers||[]).join(', ')],
          ['Visitor Goal', (state.visitorGoal||[]).join(', ')],
          ['Social', (state.socialMedia||[]).join(', ')],
          ['Features', (state.features||[]).join(', ')],
          ['Pages', (state.pages||[]).join(', ')],
          ['Logo', (state.hasLogo||[]).join(', ')],
          ['Photos', (state.hasPhotos||[]).join(', ')],
          ['Timeline', (state.timeline||[]).join(', ')],
          ['Inspiration', state.inspiration],
          ['Goals', (state.goals||[]).join(', ')],
        ];
        rows.forEach(([label, value]) => {
          if (!value) return;
          const row = document.createElement('div'); row.className = 'summary-row';
          row.innerHTML = `<span class="summary-label">${label}</span><span class="summary-value">${value}</span>`;
          sw.appendChild(row);
        });
        c.appendChild(sw);

        const actions = document.createElement('div'); actions.style.cssText = 'display:flex;gap:12px;flex-wrap:wrap;';
        const submitBtn = document.createElement('button'); submitBtn.className = 'btn-primary'; submitBtn.textContent = 'Submit →';
        submitBtn.onclick = async () => {
          submitBtn.textContent = 'Sending…'; submitBtn.disabled = true;
          const { md } = generateMarkdown();
          try {
            // Build FormData so photos can be attached as files
            const formData = new FormData();

            // Attach job photos
            if (state.jobPhotos && state.jobPhotos.length) {
              for (let i = 0; i < state.jobPhotos.length; i++) {
                const blob = await (await fetch(state.jobPhotos[i])).blob();
                formData.append(`job_photo_${i + 1}`, blob, `job-photo-${i + 1}.jpg`);
              }
            }

            const payload = {
                _subject: `New Business Brief — ${state.businessName||'Unknown'}`,
                _replyto: state.email||'',
                _autoresponse: `Hi ${state.fullName ? state.fullName.split(' ')[0] : 'there'},

Thank you for submitting your business brief — we've received everything we need to get started.

Here's what happens next:
• We'll review your brief and start working on your website
• We'll be in touch within 1–2 business days to go over the details
• If you have any questions in the meantime, just reply to this email

We're looking forward to building something great for ${state.businessName||'your business'}.

Best,
The AireyAi Team`,

                // ── Contact
                'Full Name':      state.fullName||'—',
                'Email':          state.email||'—',
                'Phone':          state.phone||'—',

                // ── Business
                'Business Name':  state.businessName||'—',
                'Industry':       (state.industry||[]).join(', ')||'—',
                'Location':       [state.city, state.country].filter(Boolean).join(', ')||'—',
                'Website':        state.website||'—',

                // ── Brand
                'One-liner':      state.tagline||'—',
                'Services':       state.services||'—',
                'Brand Voice':    (state.brandVoice||[]).join(', ')||'—',
                'Colour Palette': [(state.colourPalette||[]).join(', '), state.customColours].filter(Boolean).join(' + ')||'—',
                'Website Vibe':   (state.websiteVibe||[]).join(', ')||'—',

                // ── Customers
                'Target Customers': (state.targetCustomers||[]).join(', ')||'—',
                'Visitor Goal':     (state.visitorGoal||[]).join(', ')||'—',
                'Social Media':     (state.socialMedia||[]).join(', ')||'—',

                // ── Project
                'Features Needed':  (state.features||[]).join(', ')||'—',
                'Pages Needed':     (state.pages||[]).join(', ')||'—',
                'Has Logo':         (state.hasLogo||[]).join(', ')||'—',
                'Has Photos':       (state.hasPhotos||[]).join(', ')||'—',
                'Photos Uploaded':  state.jobPhotos && state.jobPhotos.length ? `${state.jobPhotos.length} photo(s) attached` : 'None',
                'Timeline':         (state.timeline||[]).join(', ')||'—',
                'Inspiration Sites':(state.inspiration||'—'),
                'Website Goals':    (state.goals||[]).join(', ')||'—',
                'Additional Notes': state.notes||'—',
            };

            // Append all text fields to FormData
            Object.entries(payload).forEach(([k, v]) => formData.append(k, v));

            const res = await fetch('https://formspree.io/f/xdaprbbw', {
              method: 'POST',
              headers: { 'Accept': 'application/json' },
              body: formData,
            });
            if (res.ok) { showThankYou(); }
          else { submitBtn.textContent = 'Something went wrong — try again'; submitBtn.disabled = false; }
          } catch { submitBtn.textContent = 'Something went wrong — try again'; submitBtn.disabled = false; }
        };
        actions.appendChild(submitBtn); c.appendChild(actions);

        const nav = document.createElement('div'); nav.className = 'nav-row'; nav.style.marginTop = '24px';
        const back = document.createElement('button'); back.className = 'btn-ghost'; back.textContent = '← Back'; back.onclick = () => goToStep(2);
        const reset = document.createElement('button');
        reset.style.cssText = 'font-size:12px;color:var(--danger);background:none;border:none;cursor:pointer;padding:0;font-family:DM Sans,sans-serif;';
        reset.textContent = 'Start over';
        reset.onclick = () => {
          if (!confirm('Clear all answers and start over?')) return;
          localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(STEP_KEY);
          Object.keys(state).forEach(k => delete state[k]); goToStep(0);
        };
        nav.appendChild(back); nav.appendChild(reset); c.appendChild(nav);
      },

    ];

    const saved = parseInt(localStorage.getItem(STEP_KEY)||'0', 10);
    const hasSaved = !isNaN(saved) && saved > 0 && Object.keys(state).length > 0;
    if (hasSaved) {
      goToStep(Math.min(saved, TOTAL_STEPS - 1));
    } else {
      showIntro();
    }
  </script>
</body>
</html>
